name: Pokemon Card Dealer Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

jobs:
    # ----------------------------
    # JOB 1: Testes unitários
    # ----------------------------

    testes:
        name: Testes unitários
        runs-on: ubuntu-latest

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 24

            - name: Instalar dependências via npm ci
              run: npm ci

            - name: Gerar relatório de cobertura de testes
              run: npm test -- --ci --coverage

            - name: Fazer upload do relatório de cobertura como artifact
              uses: actions/upload-artifact@v4
              with:
                name: relatorio-cobertura
                path: coverage/
                retention-days: 7


    # ----------------------------
    # JOB 2: BUILD
    # ----------------------------
    build:
        name: Build TS
        runs-on: ubuntu-latest

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            - name: Instalar dependências via npm ci
              run: npm ci

            - name: Compilar TS
              run: npm run build

            - name: Empacotar artefato de build
              run: zip -r dist.zip dist/

            - name: Fazer upload do pacote como artifact
              uses: actions/upload-artifact@v4
              with:
                name: pacote-build
                path: dist.zip
                retention-days: 7

    # ----------------------------
    # JOB 3: DEPLOY
    # ----------------------------
    deploy:
        name: Deploy Github Pages
        runs-on: ubuntu-latest
        needs: [testes, build]

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Instalar dependências via npm ci
              run: npm ci

            - name: Gerar relatório de cobertura de testes
              run: npm test -- --ci --coverage

            - name: Configurar Github Pages
              uses: actions/configure-pages@v4

            - name: Fazer upload do relatório para Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: coverage/lcov-report/

            - name: Deploy para Github Pages
              id: deployment
              uses: actions/deploy-pages@v4

    # ----------------------------
    # JOB 4: Notificação
    # ----------------------------
    notificacao:
        name: Notificação de status por e-mail
        runs-on: ubuntu-latest
        needs: [testes, build, deploy]
        if: always()

        steps:
            - name: Enviar notificação de status do pipeline
              uses: dawidd6/action-send-mail@v3
              with:
                server_address: smtp.gmail.com
                server_port: 465
                username: ${{ secrets.MAIL_USERNAME }}
                password: ${{ secrets.MAIL_PASS }}
                to: ${{ secrets.MAIL_TO }}
                from: Pokemon Card Dealer CI/CD <${{ secrets.MAIL_USERNAME }}>
                subject: "Pipeline Pokemon Card Dealer — ${{ github.ref_name }} | Testes: ${{ needs.testes.result }} | Build: ${{ needs.build.result }}"
                body: |
                    Olá!

                    O pipeline do projeto Pokemon Card Dealer foi concluído.

                    Repositório : ${{ github.repository }}
                    Branch      : ${{ github.ref_name }}
                    Commit      : ${{ github.sha }}
                    Autor       : ${{ github.actor }}

                    Status dos jobs:
                    Testes : ${{ needs.testes.result }}
                    Build  : ${{ needs.build.result }}
                    Deploy : ${{ needs.deploy.result }}

                    Relatório de cobertura:
                    https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

                    Acesse o repositório para mais detalhes:
                    https://github.com/${{ github.repository }}/actions