name: Pokemon Card Dealer Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
    # ----------------------------
    # JOB 1: Testes unitários
    # ----------------------------

    testes:
        name: Testes unitários
        runs-on: ubuntu-latest

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 24

            - name: Instalar dependências via npm ci
              run: npm ci

            - name: Gerar relatório de cobertura de testes
              run: npm test -- --ci --coverage
              continue-on-error: false

            - name: Fazer upload do relatório de cobertura como artifact
              uses: actions/upload-artifact@v4
              with:
                name: relatorio-cobertura
                path: coverage/
                retention-days: 7


    # ----------------------------
    # JOB 2: BUILD
    # ----------------------------
    build:
        name: Build TS
        runs-on: ubuntu-latest

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            - name: Instalar dependências via npm ci
              run: npm ci

            - name: Compilar TS
              run: npm run build

            - name: Empacotar artefato de build
              run: zip -r dist.zip dist/

            - name: Fazer upload do pacote como artifact
              uses: actions/upload-artifact@v4
              with:
                name: pacote-build
                path: dist.zip
                retention-days: 7

    # ----------------------------
    # JOB 3: DEPLOY
    # ----------------------------
    deploy:
        name: Deploy Github Pages
        runs-on: ubuntu-latest
        needs: [testes, build]

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4
        
            - name: Instalar Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 24

            - name: Instalar dependências via npm ci
              run: npm ci

            - name: Gerar relatório de cobertura de testes
              run: npm test -- --ci --coverage

            - name: Configurar Github Pages
              uses: actions/configure-pages@v4

            - name: Fazer upload do relatório para Pages
              uses: actions/upload-pages@v4
              with:
                path: coverage/lcov-report/

            - name: Deploy para Github Pages
              id: deployment
            uses: actions/deploy-pages@v4

    # ----------------------------
    # JOB 4: Notificação
    # ----------------------------
    notificacao:
        name: Notificação de status por e-mail
        runs-on: ubuntu-latest
        needs: [deploy]
        if: always()

        steps:
            - name: Enviar notificação de status do pipeline
              uses: dawidd6/action-send-email@v3
              with:
                server_address: smtp.gmail.com
                server_port: 465
                username: ${{ secrets.EMAIL_USERNAME }}
                password: ${{ secrets.EMAIL_PASSWORD }}
                to: ${{ secrets.EMAIL_TO }}
                from: Pokemon Card Dealer CI/CD <${{ secrets.EMAIL_USERNAME }}>
                subject: "[${{ job.status == 'success' && 'SUCESSO' || 'FALHA' }}] Pipeline Pokemon Card Dealer — ${{ github.ref_name }}"
          body: |
            Olá!

            O pipeline do projeto Pokemon Card Dealer foi concluído.

            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}
            Status      : ${{ needs.deploy.result == 'success' && 'SUCESSO ✅' || 'FALHA ❌' }}

            Relatório de cobertura:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

            Acesse o repositório para mais detalhes:
            https://github.com/${{ github.repository }}/actions
                body: "O pipeline de CI/CD para o projeto Pokemon Card Dealer foi concluído. Verifique os detalhes do pipeline para mais informações."